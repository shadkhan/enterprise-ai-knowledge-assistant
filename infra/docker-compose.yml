name: eaka

services:
  backend:
    container_name: eaka-backend
    image: eaka-backend:local
    build:
      context: ../backend
      args:
        INSTALL_LLM: "true"
    env_file:
      - ../backend/.env
    environment:
      ENVIRONMENT: local
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/knowledge
      REDIS_URL: redis://redis:6379/0
      DEFAULT_EMBEDDING_PROVIDER: mock
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      EMBEDDING_DIMENSIONS: 384
      RETRIEVAL_MODE: hybrid
      RERANKING_ENABLED: "false"
      RERANKER_PROVIDER: sentence_transformers
      RERANKER_MODEL: BAAI/bge-reranker-base
      RERANKER_TOP_N: 5
      RERANKER_CANDIDATE_MULTIPLIER: 4
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    container_name: eaka-worker
    image: eaka-backend:local
    build:
      context: ../backend
      args:
        INSTALL_LLM: "true"
    env_file:
      - ../backend/.env
    command: ["uv", "run", "python", "-m", "app.worker"]
    environment:
      ENVIRONMENT: local
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/knowledge
      REDIS_URL: redis://redis:6379/0
      DEFAULT_EMBEDDING_PROVIDER: mock
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      EMBEDDING_DIMENSIONS: 384
      RETRIEVAL_MODE: hybrid
      RERANKING_ENABLED: "false"
      RERANKER_PROVIDER: sentence_transformers
      RERANKER_MODEL: BAAI/bge-reranker-base
      RERANKER_TOP_N: 5
      RERANKER_CANDIDATE_MULTIPLIER: 4
    depends_on:
      - postgres
      - redis

  frontend:
    container_name: eaka-frontend
    image: node:22-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm dev"
    environment:
      CI: "true"
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3001:3000"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  postgres:
    container_name: eaka-postgres
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: knowledge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    container_name: eaka-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
    name: eaka-postgres-data
  redis_data:
    name: eaka-redis-data
  frontend_node_modules:
    name: eaka-frontend-node-modules
