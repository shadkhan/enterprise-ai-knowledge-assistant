name: CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      ENVIRONMENT: ci
      DEPLOYMENT_TARGET: local
      DATABASE_URL: sqlite:///./knowledge.db
      REDIS_URL: redis://localhost:6379/0
      DEFAULT_LLM_PROVIDER: mock
      DEFAULT_EMBEDDING_PROVIDER: mock
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: uv sync --frozen --group dev

      - name: Run backend tests
        run: uv run pytest -q

  frontend:
    name: Frontend Typecheck And Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Build frontend
        run: pnpm build

  docker-build:
    name: Docker Build Smoke
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --build-arg INSTALL_LLM=false --build-arg INSTALL_EMBEDDINGS=false -t eaka-backend:ci backend

      - name: Build frontend image
        run: docker build --build-arg NEXT_PUBLIC_API_BASE_URL=http://localhost:8000 -t eaka-frontend:ci frontend
